<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Магазин</title>
<script>
(() => {
  try {
    const rawDb = localStorage.getItem('miniAppDb');
    const db = rawDb ? JSON.parse(rawDb) : null;
    const darkMode = typeof db?.settings?.darkMode === 'boolean'
      ? db.settings.darkMode
      : localStorage.getItem('darkMode') !== 'false';
    const theme = darkMode ? 'dark' : 'light';
    document.documentElement.dataset.theme = theme;
    document.documentElement.style.colorScheme = theme;
    const style = document.createElement('style');
    style.textContent = darkMode
      ? 'html[data-theme="dark"] body{background:#0c1311;color:#eef4ff}html[data-theme="dark"] .phone-frame{background:#10161d}'
      : 'html[data-theme="light"] body{background:#dfe5e9;color:#122033}html[data-theme="light"] .phone-frame{background:#e7edf2}';
    document.head.appendChild(style);
  } catch (error) {
    document.documentElement.dataset.theme = 'dark';
  }
})();
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">
<link rel="stylesheet" href="../style/shop.css">
<link rel="stylesheet" href="../style/ui-preferences.css">
<link rel="stylesheet" href="../style/app-shell.css">
<link rel="stylesheet" href="../style/enhancements.css">
</head>
<body>
<div class="page-shell">
  <main class="app phone-frame">
    <div class="screen">
      <div class="toast" id="toast"></div>

      <header class="app-topbar">
        <div class="app-topbar__row row g-2 align-items-center flex-nowrap">
          <div class="col-auto app-topbar__side app-topbar__side--start">
            <button class="app-topbar__brand" id="backBtn" type="button" aria-label="На головну">
              <span class="app-brand-mark" aria-hidden="true"></span>
            </button>
          </div>
          <div class="col app-topbar__center">
            <h1 class="app-topbar__title page-title">Магазин</h1>
          </div>
          <div class="col-auto app-topbar__side app-topbar__side--end">
            <div class="app-topbar__coins coins">
              <span class="app-coin-pill__icon" aria-hidden="true"></span>
              <span id="coinBalance">125</span>
            </div>
          </div>
        </div>
      </header>

      <section class="tabs-panel">
        <div class="tabs row g-2">
          <div class="col-6 col-md-3 d-grid"><button class="tab active w-100" data-tab="items" type="button">Товари</button></div>
          <div class="col-6 col-md-3 d-grid"><button class="tab w-100" data-tab="wardrobe" type="button">Одяг</button></div>
          <div class="col-6 col-md-3 d-grid"><button class="tab w-100" data-tab="achievements" type="button">Досягнення</button></div>
          <div class="col-6 col-md-3 d-grid"><button class="tab w-100" data-tab="daily" type="button">Бонуси</button></div>
        </div>
      </section>

      <section class="shop-panel" id="shopContent"></section>

      <nav class="bottom-nav" aria-label="Нижня навігація">
        <button class="bottom-nav__item" data-nav="home" type="button"><span class="bottom-nav__icon">⌂</span><span>Головна</span></button>
        <button class="bottom-nav__item" data-nav="profile" type="button"><span class="bottom-nav__icon">●</span><span>Аватар</span></button>
        <button class="bottom-nav__item active" data-nav="shop" type="button"><span class="bottom-nav__icon">▣</span><span>Магазин</span></button>
        <button class="bottom-nav__item" data-nav="settings" type="button"><span class="bottom-nav__icon">⚙</span><span>Налаштування</span></button>
      </nav>
    </div>
  </main>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Покупка</h3>
    <p id="modalMessage">Ви успішно придбали товар.</p>
    <button class="modal-button" id="modalCloseBtn" type="button">Добре</button>
  </div>
</div>

<script src="../js/db.js"></script>
<script src="../js/ui-preferences.js"></script>
<script src="js/shop.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/howler@2.2.3/dist/howler.min.js"></script>
<script src="../js/app-enhancements.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
