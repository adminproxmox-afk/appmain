<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Аватар</title>
  <script>
    (() => {
      try {
        const rawDb = localStorage.getItem('miniAppDb');
        const db = rawDb ? JSON.parse(rawDb) : null;
        const darkMode = typeof db?.settings?.darkMode === 'boolean'
          ? db.settings.darkMode
          : localStorage.getItem('darkMode') !== 'false';
        const theme = darkMode ? 'dark' : 'light';
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        const style = document.createElement('style');
        style.textContent = darkMode
          ? 'html[data-theme="dark"] body{background:#0c1311;color:#eef4ff}html[data-theme="dark"] .phone-frame{background:#10161d}'
          : 'html[data-theme="light"] body{background:#dfe5e9;color:#122033}html[data-theme="light"] .phone-frame{background:#e7edf2}';
        document.head.appendChild(style);
      } catch (error) {
        document.documentElement.dataset.theme = 'dark';
      }
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">
  <link rel="stylesheet" href="../style/character.css">
  <link rel="stylesheet" href="../style/ui-preferences.css">
  <link rel="stylesheet" href="../style/app-shell.css">
  <link rel="stylesheet" href="../style/enhancements.css">
</head>
<body class="character-page">
  <div class="page-shell">
    <main class="phone-frame app" aria-label="Сторінка аватара">
      <div class="screen">
        <div class="toast" id="toast" aria-live="polite"></div>

        <header class="app-topbar">
          <div class="app-topbar__row row g-2 align-items-center flex-nowrap">
            <div class="col-auto app-topbar__side app-topbar__side--start">
              <button class="app-topbar__brand" id="backBtn" type="button" aria-label="На головну">
                <span class="app-brand-mark" aria-hidden="true"></span>
              </button>
            </div>
            <div class="col app-topbar__center">
              <h1 class="app-topbar__title topbar__title">Персонаж</h1>
            </div>
            <div class="col-auto app-topbar__side app-topbar__side--end">
              <div class="app-topbar__coins coin-pill" aria-label="Баланс">
                <span class="app-coin-pill__icon coin-pill__icon" aria-hidden="true"></span>
                <span id="coinBalance">125</span>
              </div>
            </div>
          </div>
        </header>

        <section class="hero-panel">
          <div class="toolbar toolbar--left" id="leftTools" aria-label="Ліві категорії"></div>

          <div class="avatar-scene">
            <div class="scene-glow"></div>

            <div class="profile-chip">
              <div>
                <p class="profile-chip__name" id="profileName">Авантюрист</p>
                <p class="profile-chip__level" id="profileStatus">Стиль готовий до змін</p>
              </div>
            </div>

            <div class="avatar-wrap">
              <div class="avatar-figure" id="avatarPreview">
                <img id="avatarImage" class="avatar-image" src="../assets/npc/Render.png" alt="Персонаж" loading="lazy">
                <div class="avatar-accent avatar-accent--left" id="avatarAuraLeft"></div>
                <div class="avatar-accent avatar-accent--right" id="avatarAuraRight"></div>
              </div>
              <div class="avatar-platform"></div>
            </div>
          </div>

          <div class="toolbar toolbar--right" id="rightTools" aria-label="Праві категорії"></div>
        </section>

        <section class="inventory-panel">
          <div class="inventory-panel__header d-flex flex-column flex-md-row align-items-start justify-content-between">
            <div>
              <p class="inventory-panel__eyebrow">Гардероб</p>
              <h2 class="inventory-panel__title" id="categoryTitle">Шкіра</h2>
            </div>
            <p class="inventory-panel__hint" id="categoryHint">Оберіть елемент, щоб застосувати його. Нові речі відкриваються у магазині.</p>
          </div>

          <div class="items-grid" id="itemsGrid" aria-live="polite"></div>
        </section>

<nav class="bottom-nav" aria-label="Нижня навігація">
  <button class="bottom-nav__item" data-nav="home" type="button">
    <span class="bottom-nav__icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
        <path fill-rule="evenodd" d="M9.293 2.293a1 1 0 0 1 1.414 0l7 7A1 1 0 0 1 17 11h-1v6a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-6H3a1 1 0 0 1-.707-1.707l7-7Z" clip-rule="evenodd" />
      </svg>
    </span>
    <span>Головна</span>
  </button>

  <button class="bottom-nav__item active" data-nav="profile" type="button">
    <span class="bottom-nav__icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
        <path d="M15.993 1.385a1.87 1.87 0 0 1 2.623 2.622l-4.03 5.27a12.749 12.749 0 0 1-4.237 3.562 4.508 4.508 0 0 0-3.188-3.188 12.75 12.75 0 0 1 3.562-4.236l5.27-4.03ZM6 11a3 3 0 0 0-3 3 .5.5 0 0 1-.72.45.75.75 0 0 0-1.035.931A4.001 4.001 0 0 0 9 14.004V14a3.01 3.01 0 0 0-1.66-2.685A2.99 2.99 0 0 0 6 11Z" />
      </svg>
    </span>
    <span>Аватар</span>
  </button>

  <button class="bottom-nav__item" data-nav="shop" type="button">
    <span class="bottom-nav__icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
        <path fill-rule="evenodd" d="M6 5v1H4.667a1.75 1.75 0 0 0-1.743 1.598l-.826 9.5A1.75 1.75 0 0 0 3.84 19H16.16a1.75 1.75 0 0 0 1.743-1.902l-.826-9.5A1.75 1.75 0 0 0 15.333 6H14V5a4 4 0 0 0-8 0Zm4-2.5A2.5 2.5 0 0 0 7.5 5v1h5V5A2.5 2.5 0 0 0 10 2.5ZM7.5 10a2.5 2.5 0 0 0 5 0V8.75a.75.75 0 0 1 1.5 0V10a4 4 0 0 1-8 0V8.75a.75.75 0 0 1 1.5 0V10Z" clip-rule="evenodd" />
      </svg>
    </span>
    <span>Магазин</span>
  </button>

  <button class="bottom-nav__item" data-nav="settings" type="button">
    <span class="bottom-nav__icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
        <path fill-rule="evenodd" d="M7.84 1.804A1 1 0 0 1 8.82 1h2.36a1 1 0 0 1 .98.804l.331 1.652a6.993 6.993 0 0 1 1.929 1.115l1.598-.54a1 1 0 0 1 1.186.447l1.18 2.044a1 1 0 0 1-.205 1.251l-1.267 1.113a7.047 7.047 0 0 1 0 2.228l1.267 1.113a1 1 0 0 1 .206 1.25l-1.18 2.045a1 1 0 0 1-1.187.447l-1.598-.54a6.993 6.993 0 0 1-1.929 1.115l-.33 1.652a1 1 0 0 1-.98.804H8.82a1 1 0 0 1-.98-.804l-.331-1.652a6.993 6.993 0 0 1-1.929-1.115l-1.598.54a1 1 0 0 1-1.186-.447l-1.18-2.044a1 1 0 0 1 .205-1.251l1.267-1.114a7.05 7.05 0 0 1 0-2.227L1.821 7.773a1 1 0 0 1-.206-1.25l1.18-2.045a1 1 0 0 1 1.187-.447l1.598.54A6.992 6.992 0 0 1 7.51 3.456l.33-1.652ZM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd" />
      </svg>
    </span>
    <span>Налаштування</span>
  </button>
</nav>
      </div>
    </main>
  </div>

  <script src="../js/db.js"></script>
  <script src="../js/ui-preferences.js"></script>
  <script src="js/character.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.3/dist/howler.min.js"></script>
  <script src="../js/app-enhancements.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
