<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <script>
    (() => {
      try {
        const rawDb = localStorage.getItem('miniAppDb');
        const db = rawDb ? JSON.parse(rawDb) : null;
        const darkMode = typeof db?.settings?.darkMode === 'boolean'
          ? db.settings.darkMode
          : localStorage.getItem('darkMode') !== 'false';
        const theme = darkMode ? 'dark' : 'light';
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        const style = document.createElement('style');
        style.textContent = darkMode
          ? 'html[data-theme="dark"] body{background:#09111d;color:#eff4ff}html[data-theme="dark"] .auth-card{background:linear-gradient(180deg,rgba(15,22,38,.94),rgba(9,14,25,.98))}'
          : 'html[data-theme="light"] body{background:#dfe6ea;color:#142436}html[data-theme="light"] .auth-card{background:linear-gradient(180deg,rgba(245,248,250,.96),rgba(228,235,240,.98))}';
        document.head.appendChild(style);
      } catch (error) {
        document.documentElement.dataset.theme = 'dark';
      }
    })();
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">
  <link rel="stylesheet" href="style/login.css">
  <link rel="stylesheet" href="style/ui-preferences.css">
  <link rel="stylesheet" href="style/enhancements.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-glow auth-glow--one"></div>
    <div class="auth-glow auth-glow--two"></div>

    <main class="card auth-card">
      <div class="icon">⬛</div>
      <h2>Увійдіть в акаунт</h2>
      <p class="subtitle" id="authSubtitle">Використайте логін, email або підключений провайдер, щоб продовжити.</p>

      <div class="field-group">
        <input type="text" id="login" placeholder="Логін або email" autocomplete="username">
        <div class="field-hint" id="loginHint">Використайте логін або email</div>
      </div>

      <div class="field-group">
        <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
        <div class="field-hint" id="passwordHint">Мінімум 8 символів, велика літера та цифра</div>
      </div>

      <button id="loginButton" type="button">Увійти</button>

      <div id="message" class="auth-message" aria-live="polite"></div>

      <div class="divider">або увійти через</div>

      <div class="socials" id="socialButtons">
        <button class="social-btn social-btn--google" data-provider="google" type="button">
          <i class="fab fa-google"></i>
          <span class="social-btn__label">Увійти через Google</span>
        </button>
        <button class="social-btn social-btn--telegram" data-provider="telegram" type="button">
          <i class="fab fa-telegram"></i>
          <span class="social-btn__label">Увійти через Telegram</span>
        </button>
      </div>

      <div class="bottom-text">Ще немає акаунта? <a href="regist.html">Зареєструватися!</a></div>
    </main>
  </div>
  <script src="js/db.js"></script>
  <script src="js/ui-preferences.js"></script>
  <script src="js/auth-provider-config.js"></script>
  <script src="js/auth-common.js"></script>
  <script src="js/auth-real.js"></script>
  <script src="js/login.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.3/dist/howler.min.js"></script>
  <script src="js/app-enhancements.js"></script>
</body>
</html>
